    - "us citizens or green card"
    - "citizen or green card"
    - "citizens or green card"
    - "usc or gc"
    - "usc/gc"
    - "gc/usc"
    - "us citizens only"
    - "u.s. citizens only"
    - "u.s citizens only"
    - "american citizens only"
    - "must be a us citizen"
    - "must be a u.s. citizen"
    - "must be us citizen"
    - "must be a citizen"
    - "citizenship required"
    - "citizenship is required"
    - "green card holder"
    - "green card holders only"
    - "green card only"
    - "green card required"
    - "gc only"
    - "gc holder"
    # Explicit no-sponsorship language (dead-end for OPT -> H-1B path)
    - "no sponsorship"
    - "not able to sponsor"
    - "unable to sponsor"
    - "will not sponsor"
    - "cannot sponsor"
    - "do not sponsor"
    - "does not sponsor"
    - "without sponsorship"
    - "no h1b"
