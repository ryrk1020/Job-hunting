# Job Hunter config
# Tune keywords, locations, and company boards here.

# Keyword groups. A job matches if any group's tokens all appear
# in the title OR description (case-insensitive). Add / remove freely.
keywords:
  data:
    - ["data", "engineer"]
    - ["data", "analyst"]
    - ["analytics", "engineer"]
    - ["etl"]
    - ["bi", "developer"]
    - ["business", "intelligence"]
    - ["snowflake"]
    - ["databricks"]
    - ["sql", "developer"]
    - ["data", "scientist"]
    - ["machine", "learning"]
    - ["ml", "engineer"]
    - ["big", "data"]
  marketing:
    - ["marketing"]
    - ["growth", "marketing"]
    - ["digital", "marketing"]
    - ["product", "marketing"]
    - ["marketing", "analyst"]
    - ["marketing", "analytics"]
    - ["brand", "manager"]
    - ["seo"]
    - ["campaign", "manager"]
    - ["crm"]
  # "Vibecoding" - AI-assisted / LLM / GenAI engineering roles.
  vibecoding:
    - ["ai", "engineer"]
    - ["llm", "engineer"]
    - ["genai"]
    - ["generative", "ai"]
    - ["prompt", "engineer"]
    - ["applied", "ai"]
    - ["forward", "deployed"]
    - ["ai", "developer"]
    - ["ai", "product"]
    - ["ml", "platform"]
    - ["rag"]
    - ["agent", "engineer"]
    - ["copilot"]
  junior:
    - ["associate"]
    - ["junior"]
    - ["entry", "level"]
    - ["new", "grad"]

# Location preferences. Jobs matching the "preferred" list get a score boost.
# Jobs matching the "allowed" list are kept. "remote" is always allowed.
locations:
  preferred:
    - frisco
    - dallas
    - fort worth
    - plano
    - irving
    - arlington
    - richardson
    - addison
    - las colinas
    - mckinney
    - allen
    - denton
  allowed_states:
    - texas
    - tx
  allow_remote: true

# Anything containing these tokens will be excluded.
exclude:
  companies:
    - cognizant
  # Small / early-stage startups we don't want in the feed.
  # Add company names (case-insensitive substring match) to skip them.
  companies_early_stage:
    - stealth
    - seed stage
  titles:
    - "senior staff"
    - "principal"
    - "director"
    - "vp "
    - "head of"

# Freshness — only keep jobs posted within this many days.
max_age_days: 7

# Minimum unique jobs we want per run. The runner will widen
# searches (drop location filter) until we hit this floor.
min_jobs_target: 50

# Sources to enable.
sources:
  remotive: true
  remoteok: true
  themuse: true
  adzuna: true          # needs ADZUNA_APP_ID + ADZUNA_APP_KEY env vars
  usajobs: true         # needs USAJOBS_EMAIL + USAJOBS_API_KEY env vars (free)
  indeed_rss: true
  linkedin: true
  greenhouse: true
  lever: true
  ashby: true
  smartrecruiters: true
  workable: true
  workday: true
  ycombinator: false    # default off — firehose of small startups

# Indeed RSS queries (location-qualified). Expand as needed.
indeed_rss_queries:
  - { q: "data engineer",     l: "Dallas, TX" }
  - { q: "data analyst",      l: "Dallas, TX" }
  - { q: "analytics engineer",l: "Dallas, TX" }
  - { q: "ai engineer",       l: "Dallas, TX" }
  - { q: "machine learning",  l: "Dallas, TX" }
  - { q: "data engineer",     l: "Frisco, TX" }
  - { q: "data analyst",      l: "Frisco, TX" }
  - { q: "data engineer",     l: "Fort Worth, TX" }
  - { q: "data engineer",     l: "Plano, TX" }
  - { q: "marketing analyst", l: "Dallas, TX" }
  - { q: "marketing",         l: "Frisco, TX" }
  - { q: "marketing",         l: "Fort Worth, TX" }
  - { q: "ai engineer",       l: "Texas" }
  - { q: "llm engineer",      l: "Texas" }
  - { q: "genai",             l: "Texas" }
  - { q: "data engineer",     l: "Texas" }
  - { q: "marketing",         l: "Texas" }

# LinkedIn queries (public guest search endpoint).
linkedin_queries:
  - { q: "data engineer",      l: "Dallas, Texas, United States" }
  - { q: "data analyst",       l: "Dallas, Texas, United States" }
  - { q: "analytics engineer", l: "Dallas, Texas, United States" }
  - { q: "ai engineer",        l: "Dallas, Texas, United States" }
  - { q: "llm engineer",       l: "Dallas, Texas, United States" }
  - { q: "data engineer",      l: "Frisco, Texas, United States" }
  - { q: "data engineer",      l: "Fort Worth, Texas, United States" }
  - { q: "data engineer",      l: "Plano, Texas, United States" }
  - { q: "marketing",          l: "Dallas, Texas, United States" }
  - { q: "marketing analyst",  l: "Dallas, Texas, United States" }
  - { q: "data engineer",      l: "Texas, United States" }
  - { q: "ai engineer",        l: "Texas, United States" }

