    - ["software", "developer"]
    - ["application", "developer"]
    - ["application", "engineer"]
    - ["python"]
    - ["java", "developer"]
    - ["golang"]
    - ["c++"]
    - ["c#"]
    - [".net"]
    - ["typescript"]
    - ["javascript"]
