# Job Hunter config
# Tune keywords, locations, and company boards here.

# Keyword groups. A job matches if any group's tokens all appear
# in the title OR description (case-insensitive). Add / remove freely.
keywords:
  data:
    - ["data", "engineer"]
    - ["data", "analyst"]
    - ["analytics", "engineer"]
    - ["etl"]
    - ["bi", "developer"]
    - ["business", "intelligence"]
    - ["snowflake"]
    - ["databricks"]
    - ["sql"]
    - ["data", "scientist"]
    - ["machine", "learning"]
    - ["ml", "engineer"]
    - ["big", "data"]
    - ["data", "warehouse"]
    - ["power", "bi"]
    - ["tableau"]
    - ["informatica"]
  # "Vibecoding" — AI-assisted / LLM / GenAI engineering roles.
  vibecoding:
    - ["ai", "engineer"]
    - ["llm"]
    - ["genai"]
    - ["generative", "ai"]
    - ["prompt", "engineer"]
    - ["applied", "ai"]
    - ["forward", "deployed"]
    - ["ai", "developer"]
    - ["ai", "product"]
    - ["ml", "platform"]
    - ["rag"]
    - ["agent", "engineer"]
    - ["copilot"]
  # Any full-stack / frontend / backend / mobile engineering role.
  fullstack:
    - ["full", "stack"]
    - ["fullstack"]
    - ["frontend"]
    - ["front", "end"]
    - ["backend"]
    - ["back", "end"]
    - ["web", "developer"]
    - ["ui", "developer"]
    - ["ux", "engineer"]
    - ["react"]
    - ["angular"]
    - ["vue"]
    - ["node"]
    - ["next.js"]
    - ["mobile", "developer"]
    - ["ios", "developer"]
    - ["android", "developer"]
  # Generic software engineering (languages + titles).
  software:
    - ["software", "engineer"]
    - ["software", "developer"]
    - ["application", "developer"]
    - ["application", "engineer"]
    - ["python"]
    - ["java", "developer"]
    - ["golang"]
    - ["c++"]
    - ["c#"]
    - [".net"]
    - ["typescript"]
    - ["javascript"]
    - ["ruby"]
    - ["php"]
    - ["scala"]
    - ["rust"]
    - ["embedded"]
    - ["firmware"]
    - ["platform", "engineer"]
    - ["systems", "engineer"]
    - ["api", "developer"]
  # QA / test / SDET.
  qa:
    - ["qa", "engineer"]
    - ["quality", "engineer"]
    - ["quality", "assurance"]
    - ["test", "engineer"]
    - ["tester"]
    - ["sdet"]
    - ["automation", "engineer"]
    - ["selenium"]
    - ["cypress"]
    - ["playwright"]
  # Cloud / DevOps / SRE / infra.
  cloud:
    - ["devops"]
    - ["sre"]
    - ["site", "reliability"]
    - ["cloud", "engineer"]
    - ["aws", "engineer"]
    - ["azure", "engineer"]
    - ["gcp"]
    - ["kubernetes"]
    - ["terraform"]
    - ["infrastructure", "engineer"]
    - ["platform", "engineer"]
  # Security / networking.
  security:
    - ["security", "engineer"]
    - ["cybersecurity"]
    - ["infosec"]
    - ["application", "security"]
    - ["network", "engineer"]
  # Generic analyst roles (business, product, systems).
  analyst:
    - ["business", "analyst"]
    - ["systems", "analyst"]
    - ["product", "analyst"]
    - ["financial", "analyst"]
    - ["reporting", "analyst"]
    - ["operations", "analyst"]
  # Project / product / scrum management on tech teams.
  product:
    - ["product", "manager"]
    - ["technical", "program"]
    - ["scrum", "master"]
    - ["project", "manager"]
  # Junior / entry-level hints get a score boost.
  junior:
    - ["associate"]
    - ["junior"]
    - ["entry", "level"]
    - ["new", "grad"]
    - ["i "]
    - ["ii "]

# Location preferences. Jobs matching the "preferred" list get a score boost.
# Jobs matching the "allowed" list are kept. "remote" is always allowed.
locations:
  preferred:
    - frisco
    - dallas
    - fort worth
    - plano
    - irving
    - arlington
    - richardson
    - addison
    - las colinas
    - mckinney
    - allen
    - denton
  allowed_states:
    - texas
    - tx
  allow_remote: true

# Anything containing these tokens will be excluded.
exclude:
  companies:
    - cognizant
  # Small / early-stage startups we don't want in the feed.
  # Add company names (case-insensitive substring match) to skip them.
  companies_early_stage:
    - stealth
    - seed stage
  titles:
    - "senior"
    - "sr."
    - "sr "
    - "staff"
    - "principal"
    - "lead "
    - "architect"
    - "director"
    - "vp "
    - "head of"
    - "chief"
  # Work-authorization / citizenship gates that exclude F-1/OPT candidates.
  # Matched (case-insensitive) against company + title + description.
  # Add or remove as real postings surface false positives.
  work_auth:
    # Explicit citizenship-only language
    - "us citizen or green card"
    - "us citizens or green card"
    - "citizen or green card"
    - "citizens or green card"
    - "usc or gc"
    - "usc/gc"
    - "gc/usc"
    - "us citizens only"
    - "u.s. citizens only"
    - "u.s citizens only"
    - "american citizens only"
    - "must be a us citizen"
    - "must be a u.s. citizen"
    - "must be us citizen"
    - "must be a citizen"
    - "citizenship required"
    - "citizenship is required"
    - "green card holder"
    - "green card holders only"
    - "green card only"
    - "green card required"
    - "gc only"
    - "gc holder"
    # Explicit no-sponsorship language (dead-end for OPT -> H-1B path)
    - "no sponsorship"
    - "not able to sponsor"
    - "unable to sponsor"
    - "will not sponsor"
    - "cannot sponsor"
    - "do not sponsor"
    - "does not sponsor"
    - "without sponsorship"
    - "no h1b"
    - "no h-1b"
    - "no h1-b"
    - "not providing sponsorship"
    - "not offering sponsorship"
    - "sponsorship is not available"
    - "sponsorship not available"
    - "sponsorship will not be provided"
    # Security clearance — requires US citizenship
    - "security clearance"
    - "active clearance"
    - "active secret"
    - "top secret"
    - "ts/sci"
    - "public trust clearance"
    - "clearance required"
    - "must have clearance"
    - "must hold clearance"
    - "ability to obtain a clearance"
    - "ability to obtain clearance"
    - "must be able to obtain a security clearance"
    - "must be able to obtain clearance"

# Freshness — only keep jobs posted within this many days.
max_age_days: 7

# When true, drop any posting that has no parseable posted_at date.
# Many ATS feeds (Greenhouse/Lever) omit it; with this on, those are
# dropped so the dashboard shows only provably-recent postings.
strict_freshness: true

# Candidate's actual years of experience. Postings whose description
# demands more than this many years are dropped. Set to your real YoE.
candidate_experience_years: 2

# Hard cap on years of experience a posting may demand. Any "X+ years"
# text in the description with X greater than this is excluded.
max_experience_years: 4

# Target jobs per run. Acts as BOTH a floor (search widens to reach it)
# AND a ceiling (output is truncated to exactly this many — highest
# scored, preferred-location first).
min_jobs_target: 250

# Sources to enable.
sources:
  remotive: true
  remoteok: true
  themuse: true
  adzuna: true          # needs ADZUNA_APP_ID + ADZUNA_APP_KEY env vars
  usajobs: true         # needs USAJOBS_EMAIL + USAJOBS_API_KEY env vars (free)
  indeed_rss: true
  linkedin: true
  greenhouse: true
  lever: true
  ashby: true
  smartrecruiters: true
  workable: true
  workday: true
  ycombinator: false    # default off — firehose of small startups

