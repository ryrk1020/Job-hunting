# Manual rerun marker: 2026-04-25T05:00Z — strict 3-yoe + seniority regex

# Keyword groups. A job matches if any group's tokens all appear
# in the title OR description (case-insensitive).
#
# Data-only profile: only data / data-engineering roles are surfaced.
# Other role families (fullstack, software, QA, cloud, security, etc.)
# were intentionally removed on the feature/data-only-top10 branch.
