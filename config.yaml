# Anything containing these tokens will be excluded.
exclude:
  companies: []
  # Small / early-stage startups we don't want in the feed.
  # Add company names (case-insensitive substring match) to skip them.
  companies_early_stage:
    - stealth
    - seed stage
  # Substring fallbacks (case-insensitive). The real seniority
  # detection is a word-boundary regex in scraper/filters.py
  # (_SENIOR_TITLE_RES) so it catches "Lead" at end-of-title,
  # "Vice President", numbered grades like "Engineer 3 / IV", etc.
  titles:
    - "senior"
    - "sr."
    - "sr "
    - "staff"
    - "principal"
    - "architect"
    - "director"
    - "vice president"
    - "head of"
    - "chief"
  # Employment-type filter. We only want full-time or contract/contract-to-
  # hire roles — no part-time, no internships, no co-ops, no seasonal.
  # Matched (case-insensitive) against company + title + description.
  employment:
    - "part-time"
    - "part time"
    - "parttime"
    - "(part time)"
    - "(part-time)"
    - "internship"
    - "intern role"
    - "intern program"
    - "intern position"
    - "intern opportunity"
    - "summer intern"
    - "summer 2025 intern"
    - "summer 2026 intern"
    - "graduate intern"
    - "student intern"
    - "phd intern"
    - "ms intern"
    - "bs intern"
    - "research intern"
    - "engineering intern"
    - "software intern"
    - "data intern"
    - "co-op"
    - "coop student"
    - "apprentice"
    - "apprenticeship"
    - "work study"
    - "work-study"
    - "seasonal"

  # Work-authorization / citizenship gates that exclude F-1/OPT candidates.
  # Matched (case-insensitive) against company + title + description.
  # Add or remove as real postings surface false positives.
  work_auth:
    # Explicit citizenship-only language
    - "us citizen or green card"
    - "us citizens or green card"
    - "citizen or green card"
    - "citizens or green card"
    - "usc or gc"
    - "usc/gc"
    - "gc/usc"
    - "us citizens only"
    - "u.s. citizens only"
    - "u.s citizens only"
    - "american citizens only"
    - "must be a us citizen"
    - "must be a u.s. citizen"
    - "must be us citizen"
    - "must be a citizen"
    - "citizenship required"
    - "citizenship is required"
    - "green card holder"
    - "green card holders only"
    - "green card only"
    - "green card required"
    - "gc only"
    - "gc holder"
    # Explicit no-sponsorship language (dead-end for OPT -> H-1B path)
    - "no sponsorship"
    - "not able to sponsor"
    - "unable to sponsor"
    - "will not sponsor"
    - "cannot sponsor"
    - "do not sponsor"
    - "does not sponsor"
    - "without sponsorship"
    - "no h1b"
    - "no h-1b"
    - "no h1-b"
    - "not providing sponsorship"
    - "not offering sponsorship"
    - "sponsorship is not available"
    - "sponsorship not available"
    - "sponsorship will not be provided"
    # Security clearance — requires US citizenship
    - "security clearance"
    - "active clearance"
    - "active secret"
    - "top secret"
    - "ts/sci"
    - "public trust clearance"
    - "clearance required"
    - "must have clearance"
    - "must hold clearance"
    - "ability to obtain a clearance"
    - "ability to obtain clearance"
    - "must be able to obtain a security clearance"
    - "must be able to obtain clearance"

# Freshness — only keep jobs posted within this many days.
max_age_days: 7

# When true, drop any posting that has no parseable posted_at date.
# Many ATS feeds (Greenhouse/Lever) omit it; with this on, those are
# dropped so the dashboard shows only provably-recent postings.
strict_freshness: true

# Candidate's actual years of experience. Postings whose description
# demands more than this many years are dropped. Set to your real YoE.
candidate_experience_years: 2

# Hard cap on years of experience a posting may demand. Any "X+ years"
# text in the description with X greater than this is excluded. The
# user has 2 YoE and is open to roles requiring up to 3.
max_experience_years: 3

# Strict-experience mode. When true, any posting whose full description
# we can't actually read (shorter than min_description_chars) is dropped
# — because a '5+ years' requirement hides in the body that list-only
# endpoints like LinkedIn / Workday / Workable / SmartRecruiters don't
# return. LinkedIn descriptions are fetched on a best-effort basis.
strict_experience_filter: true
min_description_chars: 120

# Target jobs per run. Acts as BOTH a floor (search widens to reach it)
# AND a ceiling (output is truncated to exactly this many — highest
# scored, preferred-location first).
min_jobs_target: 250

# Sources to enable.
sources:
  remotive: true
  remoteok: true
  themuse: true
  adzuna: true          # needs ADZUNA_APP_ID + ADZUNA_APP_KEY env vars
  usajobs: true         # needs USAJOBS_EMAIL + USAJOBS_API_KEY env vars (free)
  indeed_rss: true
  linkedin: true
  greenhouse: true
  lever: true
  ashby: true
  smartrecruiters: true
  workable: true
  workday: true
  ycombinator: false    # default off — firehose of small startups

