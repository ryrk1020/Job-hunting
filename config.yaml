# Workday tenants — large TX-heavy employers.
# You can find the {tenant, host, site} by visiting a company's careers page and
# inspecting the jobs URL, e.g. att.wd1.myworkdayjobs.com/External -> tenant=att, site=External.
workday_tenants:
  - { tenant: "att",      host: "wd1",   site: "ATTEXT" }
  - { tenant: "usaa",     host: "wd1",   site: "USAAJOBSWEBSITE" }
  - { tenant: "jpmc",     host: "wd1",   site: "jpmc" }
  - { tenant: "capitalone", host: "wd1", site: "capitalone" }
  - { tenant: "fidelity", host: "wd1",   site: "professional" }
  - { tenant: "charlesschwab", host: "wd1", site: "External" }
  - { tenant: "dell",     host: "wd1",   site: "External" }
  - { tenant: "pepsico",  host: "wd3",   site: "PepsiCoJobs" }
  - { tenant: "mckesson", host: "wd1",   site: "External_Career_Site" }
  - { tenant: "texasinstruments", host: "wd5", site: "External" }
  - { tenant: "7-11",     host: "wd1",   site: "7ElevenCareers" }

# Workday search queries (run against every tenant).
workday_queries:
  - "data engineer"
  - "data analyst"
  - "marketing"
  - "ai engineer"
  - "machine learning"
