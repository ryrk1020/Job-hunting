    - ["data", "engineer"]
    - ["data", "analyst"]
    - ["data", "scientist"]
    - ["data", "warehouse"]
    - ["data", "platform"]
    - ["data", "modeler"]
    - ["data", "modeling"]
    - ["data", "ops"]
    - ["dataops"]
    - ["analytics", "engineer"]
    - ["bi", "developer"]
    - ["bi", "engineer"]
    - ["business", "intelligence"]
    - ["etl"]
    - ["elt"]
    - ["snowflake"]
    - ["databricks"]
    - ["redshift"]
    - ["bigquery"]
    - ["spark"]
    - ["airflow"]
    - ["dbt"]
    - ["kafka"]
    - ["hadoop"]
    - ["informatica"]
    - ["power", "bi"]
    - ["tableau"]
    - ["big", "data"]
  # NOTE: the legacy "junior" keyword group is intentionally removed in
  # the data-only profile. Junior / entry-level signals are still applied
  # as a SCORING boost inside scraper/filters.py:score(), but they no
  # longer act as their own keyword gate (which previously could let a
  # non-data role through if its description mentioned "associate" or
  # "junior").

