<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Job Hunter — Data Roles Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/><path d="M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>
      </span>
      <div class="brand-text">
        <h1>Job Hunter <span class="brand-tag">data only</span></h1>
        <p id="subtitle">Loading…</p>
      </div>
    </div>

    <div class="header-actions">
      <a id="rerun-link" class="header-link" href="#" target="_blank" rel="noopener" title="Trigger a fresh scrape on GitHub Actions">Run scrape ↗</a>
      <button id="refresh-btn" class="icon-btn" title="Reload latest data" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
      <button id="export-btn" class="icon-btn" title="Export current view to Excel" aria-label="Export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
      <button id="theme-btn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <section class="kpi-strip" aria-label="Key metrics">
    <div class="kpi"><span class="kpi-label">Today</span><span id="kpi-today" class="kpi-value">—</span></div>
    <div class="kpi"><span class="kpi-label">Selected day</span><span id="kpi-selected" class="kpi-value">—</span></div>
    <div class="kpi"><span class="kpi-label">Days tracked</span><span id="kpi-days" class="kpi-value">—</span></div>
    <div class="kpi"><span class="kpi-label">All-time</span><span id="kpi-total" class="kpi-value">—</span></div>
  </section>

  <main class="layout">
    <aside class="calendar-pane" aria-label="Calendar">
      <div class="pane-title"><span>Calendar</span></div>
      <div class="cal-head">
        <button id="cal-prev" class="icon-btn-sm" aria-label="Previous month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 id="cal-title">—</h2>
        <button id="cal-next" class="icon-btn-sm" aria-label="Next month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="cal-dow">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div id="calendar" class="cal-grid"></div>
      <button id="today-btn" class="btn btn-ghost btn-block">Jump to latest</button>
      <div class="legend">
        <span class="dot has-jobs"></span>has jobs
        <span class="dot today"></span>today
        <span class="dot selected"></span>selected
      </div>
    </aside>

    <section class="jobs-pane" aria-label="Jobs">
      <div class="pane-title">
        <span>Jobs</span>
        <span id="count" class="count">0 jobs</span>
      </div>
      <div class="controls">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="q" placeholder="Search company, title, location, source…" />
        </div>
        <select id="loc" aria-label="Location">
          <option value="">All locations</option>
          <option value="preferred">Preferred (DFW)</option>
          <option value="remote">Remote</option>
        </select>
        <select id="sort" aria-label="Sort">
          <option value="score">Sort: Score</option>
          <option value="posted">Sort: Posted date</option>
          <option value="company">Sort: Company A→Z</option>
          <option value="title">Sort: Title A→Z</option>
        </select>
      </div>
      <div id="jobs" class="jobs"></div>
    </section>
  </main>

  <aside id="detail-drawer" class="drawer" hidden aria-label="Job details">
    <div class="drawer-scrim" data-close="1"></div>
    <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
      <div class="drawer-head">
        <h2 id="drawer-title">Job details</h2>
        <button class="icon-btn" data-close="1" aria-label="Close drawer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="drawer-body" class="drawer-body"></div>
    </div>
  </aside>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
